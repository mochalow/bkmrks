services:
  web:
    build: .
    container_name: bkmrks
    ports:
      - "8000:8000"
    volumes:
      - bkmrks-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bkmrks-data: