<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>bkmrks</title>
    <link rel="stylesheet" href="/css/app.css">
    <script type="module" src="/js/library.js"></script>
</head>
<body>
<div class="page">

    <header class="topbar">
        <a class="brand" href="/">
            <svg class="brand-mark" width="24" height="29" viewBox="0 0 40 48" aria-hidden="true">
                <path d="M0,6 A6,6 0 0 1 6,0 H34 A6,6 0 0 1 40,6 V48 L20,36 L0,48 Z"/>
            </svg>
            <span class="brand-name">bkmrks</span>
        </a>

        <form class="save-form">
            <input class="save-input" type="url" placeholder="Вставьте ссылку на статью…" aria-label="Адрес статьи">
            <button class="btn btn-primary" type="submit">Сохранить</button>
        </form>
    </header>

    <main>
        <div class="filters">
            <div class="search">
                <span class="search-icon" aria-hidden="true">🔍</span>
                <input class="search-input" type="search" placeholder="Поиск по словам" aria-label="Поиск по словам">
            </div>
            <div class="chips">
                <button class="chip is-active" type="button">все</button>
                <button class="chip" type="button">python</button>
                <button class="chip" type="button">docker</button>
                <button class="chip" type="button">капуста кимчи</button>
            </div>
        </div>

        <section class="cards" id="cards"></section>
        <p class="cards-status" id="cards-status">Библиотека загружается...</p>
    </main>

</div>

<template id="card-template">
    <article class="card">
        <div class="card-head">
            <h2 class="card-title"></h2>
            <time class="card-date"></time>
        </div>
        <div class="card-domain"></div>
        <p class="card-excerpt"></p>
        <div class="card-tags">
            <span class="tag"></span>
        </div>
    </article>
</template>
</body>
</html>
