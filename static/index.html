<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>bkmrks</title>

    <script type="importmap">
        {
          "imports": {
            "vue": "/js/vue.esm-browser.prod.js"
          }
        }
    </script>

    <link rel="stylesheet" href="/css/app.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script type="module" src="/js/library.js"></script>
</head>

<body>

<!-- Точка монтирования Vue -->
<div id="app" class="page" v-cloak>

    <header class="topbar">
        <a class="brand" href="/" aria-label="bkmrks — на главную">
            <svg class="brand-mark" width="24" height="29" viewBox="0 0 40 48" aria-hidden="true">
                <path d="M0,6 A6,6 0 0 1 6,0 H34 A6,6 0 0 1 40,6 V48 L20,36 L0,48 Z"/>
            </svg>
            <span class="brand-name">bkmrks</span>
        </a>

        <form class="save-form" @submit.prevent="save">
            <input class="save-input" type="url" v-model="newUrl" placeholder="Вставьте ссылку на статью..."
                   aria-label="Адрес статьи" required>
            <button class="btn btn-primary" type="submit" :disabled="saving">
                {{ saving ? "Сохранение" : "Сохранить" }}
            </button>
        </form>
    </header>

    <p class="save-error" v-if="saveError" role="alert">{{ saveError }}</p>

    <main>
        <div class="filters">
            <div class="search">
                <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
                    <circle cx="11" cy="11" r="7"/>
                    <path d="M20 20l-3.5-3.5"/>
                </svg>
                <input class="search-input" type="search" v-model="q" placeholder="Поиск"
                       aria-label="Поиск">
            </div>
            <div class="tags-bar">
                <div class="chips-wrap">
                    <div class="chips" ref="chipsEl"
                         :class="{ 'is-collapsed': tagsOverflow && !tagsExpanded }">
                        <button class="chip" type="button" :class="{ 'is-active': activeTag === '' }"
                                @click="selectTag('')">все
                        </button>
                        <button v-for="tag in allTags" :key="tag" class="chip" type="button"
                                :class="{ 'is-active': activeTag === tag }" :title="tag"
                                @click="selectTag(tag)">{{ tag }}
                        </button>
                    </div>
                    <button v-if="tagsOverflow" class="chip chip-more" type="button"
                            :aria-expanded="tagsExpanded" @click="tagsExpanded = !tagsExpanded">
                        {{ tagsExpanded ? "Свернуть" : "Ещё " + hiddenTagCount }}
                    </button>
                </div>
            </div>
        </div>

        <section class="cards">
            <a v-for="article in articles" :key="article.id" class="card-link" :href="readerHref(article.id)">
                <article class="card">
                    <div class="card-head">
                        <h2 class="card-title">{{ article.title || "Без заголовка" }}</h2>
                        <time class="card-date" :datetime="article.saved_at">
                            {{ dateShort(article.saved_at) }}
                        </time>
                    </div>
                    <div class="card-domain">{{ domainOf(article.url) }}</div>
                    <p class="card-excerpt" v-if="article.content">
                        {{ excerptOf(article.content) }}
                    </p>
                    <div class="card-tags" v-if="article.tags.length">
                        <span class="tag" v-for="tag in article.tags" :key="tag" :title="tag">{{ tag }}</span>
                    </div>
                </article>
            </a>
        </section>

        <p class="cards-status" v-if="status">{{ status }}</p>
    </main>
</div>

</body>

</html>
