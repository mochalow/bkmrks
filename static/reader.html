<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>bkmrks — читалка</title>

    <script>
        (function () {
            var saved = localStorage.getItem("bkmrks:theme");
            if (saved === "light" || saved === "dark") document.documentElement.dataset.theme = saved;
        })();
    </script>

    <script type="importmap">
        {
          "imports": {
            "vue": "/js/vue.esm-browser.prod.js"
          }
        }
    </script>

    <link rel="stylesheet" href="/css/app.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script type="module" src="/js/reader.js"></script>
</head>
<body>

<div id="app" v-cloak>

    <header class="reader-toolbar">
        <a class="back-link" href="/" aria-label="Вернуться в библиотеку">← В библиотеку</a>

        <div class="toolbar-right">
            <!-- Действия появляются только когда статья загружена -->
            <div class="toolbar-actions" v-if="article">
                <div class="font-size-control" role="group" aria-label="Размер шрифта">
                    <button type="button" :disabled="!canDecreaseFontSize"
                            aria-label="Уменьшить шрифт" @click="stepFontScale(-1)">A-
                    </button>
                    <span class="font-size-value" aria-live="polite">{{ fontSizePx }}</span>
                    <button type="button" :disabled="!canIncreaseFontSize"
                            aria-label="Увеличить шрифт" @click="stepFontScale(1)">A+
                    </button>
                </div>
                <a class="btn-secondary" :href="article.url" target="_blank" rel="noopener">Оригинал ↗</a>
                <button class="btn-danger" type="button"
                        :disabled="deleting" @click="removeArticle">Удалить
                </button>
            </div>

            <button class="theme-toggle" type="button" @click="toggleTheme"
                    :aria-label="theme === 'dark' ? 'Включить светлую тему' : 'Включить тёмную тему'">
                <svg v-if="theme === 'dark'" width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                    <circle cx="12" cy="12" r="4"/>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                </svg>
                <svg v-else width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                </svg>
            </button>
        </div>
    </header>

    <main class="reader">
        <p class="reader-status" v-if="status">{{ status }}</p>
        <a class="back-link reader-back-link" href="/" v-if="showBackLink"
           aria-label="Вернуться в библиотеку">← В библиотеку</a>

        <article v-if="article">
            <p class="reader-meta">
                <span>{{ domainOf(article.url) }}</span>
                <template v-if="article.author"> · {{ article.author }}</template>
                · сохранено
                <time :datetime="article.saved_at">{{ dateLong(article.saved_at) }}</time>
                <template v-if="article.content"> · {{ readingTimeOf(article.content) }}</template>
            </p>
            <h1 class="reader-title">{{ article.title || "Без заголовка" }}</h1>

            <div class="reader-tags">
                <span class="tag" v-for="tag in article.tags" :key="tag">
                    <span class="tag-name" :title="tag">{{ tag }}</span>
                    <button class="tag-remove" type="button"
                            :aria-label="'Убрать тег ' + tag"
                            :disabled="removingTag === tag"
                            @click="dropTag(tag)">×</button>
                </span>

                <button class="tag-add" type="button" ref="addTagButton"
                        v-if="!tagFormOpen" @click="openTagForm">+ тег
                </button>
                <form class="tag-form" v-else ref="tagForm" @submit.prevent="submitTag">
                    <input class="tag-input" type="text" ref="tagInput" v-model="newTag"
                           :disabled="addingTag" placeholder="имя тега"
                           aria-label="Имя нового тега" @keydown.esc="closeTagForm">
                </form>
            </div>

            <div class="reader-content" :style="{ '--reader-font-scale': fontScale }">
                <p v-for="(para, i) in paragraphs" :key="i">{{ para }}</p>
            </div>
        </article>
    </main>
</div>

</body>
</html>
